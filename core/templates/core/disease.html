{% extends 'core/base.html' %}

{% block content %}

<h2>🌿 Plant Disease Detection</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload & Detect</button>
</form>

<hr>

{% if result %}
    <h3>🧠 Result:</h3>
    <p>{{ result }}</p>
{% endif %}

{% endblock %}
